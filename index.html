<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진에어 항공 좌석 요청서 자동화 폼 (황지정고 템플릿 반영)</title>
    
    <!-- 카카오톡/페이스북 공유 썸네일 (Open Graph) -->
    <meta property="og:title" content="진에어 항공 좌석 요청서 자동화 폼">
    <meta property="og:description" content="진에어 학단 좌석 요청서를 웹에서 작성하고 템플릿/JSON 저장 기능으로 업무를 자동화하세요.">
    <meta property="og:image" content="https://blogger.googleusercontent.com/img/a/AVvXsEhPxG_ONo2BdFAGDNnn-pHIGJTrAq374YbqgwTTlyIZTP22kOWTDD_AyjKDNFPhsHg5t1Iq6zV0dL_NZIj4o97Kd0eWJYCv-NHhtIqme-Mp3htGhAdkqVv5NRU3Jc9TbdbvvVKrPslObA1oNABpgl12QtGwirC2QM5lcPCVoWm8pIbeKuZBbeDHAvpbKEQ">
    
    <!-- GA4 (투어메이커 공식) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLH9GD9SVR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLH9GD9SVR');
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (브라우저에서 JSX 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @font-face {
            font-family: 'Malgun Gothic';
            src: local('Malgun Gothic');
        }

        @media print {
            body { background-color: white !important; margin: 0; padding: 0; }
            @page { size: A4 portrait; margin: 12mm; }
            .page-break { page-break-before: always; }
            
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .print-input-table { background: transparent !important; border: none !important; color: black !important; }
            .print-input-table::placeholder { color: transparent !important; }
            .print-input-line { background: transparent !important; border-bottom: 1px solid transparent !important; color: black !important; }
            .print-input-line::placeholder { color: transparent !important; }
            
            .no-print { display: none !important; }
        }

        body { font-family: 'Malgun Gothic', 'Dotum', 'Apple SD Gothic Neo', sans-serif; letter-spacing: -0.04em; }

        .print-input-table {
            width: 100%; height: 100%; min-height: 28px;
            background-color: #f8fafc; border: 1px solid transparent;
            padding: 4px; font-family: inherit; font-size: 13.5px;
            text-align: center; transition: all 0.2s;
        }
        .print-input-table:focus { background-color: #fff !important; border-color: #221F5F !important; outline: none; }
        
        .print-input-line {
            background-color: #f0f4f8; border-bottom: 1px solid #000;
            padding: 0 6px; font-family: inherit; font-size: inherit; transition: 0.2s;
        }
        .print-input-line:focus { background-color: #fff; border-bottom: 2px solid #221F5F; outline: none; }

        .doc-table { width: 100%; border-collapse: collapse; border-top: 2px solid #000; border-bottom: 2px solid #000; }
        .doc-table th, .doc-table td { border: 1px solid #000; padding: 8px 4px; font-size: 14px; color: #000; height: 36px; vertical-align: middle; }
        .doc-table th { font-weight: bold; text-align: center; background-color: #f2f2f2; }
        
        .box-border-strong { border: 2px solid #000; padding: 15px; }
        .text-red-strong { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-24 print:bg-white print:pb-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
        const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const IconFolder = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>;
        const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('school');
            const fileInputRef = useRef(null);

            const handlePrint = () => window.print();

            const exportToJson = () => {
                const inputs = document.querySelectorAll('input');
                const data = {};
                inputs.forEach(input => { if (input.name) data[input.name] = input.value; });
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `JinAir_Form_${activeTab}_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const importFromJson = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        applyData(data);
                    } catch (err) {
                        alert("파일을 읽는 중 오류가 발생했습니다.");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; 
            };

            const loadHwangjiTemplate = () => {
                const sampleData = {
                    s_route: "원주 - 제주",
                    s_y: "2026", s_m: "03", s_d: "23",
                    s_night: "3", s_day: "4",
                    s_dep1: "원주(WJU)", s_arr1: "제주(CJU)", s_date1: "09/08", s_flt1: "LJ471", s_seat1: "50석",
                    s_dep2: "제주(CJU)", s_arr2: "원주(WJU)", s_date2: "09/11", s_flt2: "LJ474", s_seat2: "50석",
                    s_school: "황지정보산업고등학교", s_teacher: "김유숙", s_address: "강원특별자치도 태백시 문화로1길 1",
                    s_tel: "033-550-6520", s_hp: "010-8231-3980", s_fax: "",
                    s_agency: "투어메이커",
                    s_sign_name: "최준집",
                    s_agree_school: "황지정보산업고등학교",
                    s_bottom_name: "최준집"
                };
                setActiveTab('school');
                setTimeout(() => applyData(sampleData), 100);
            };

            const applyData = (data) => {
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    if (input.name && data[input.name] !== undefined) {
                        input.value = data[input.name];
                    }
                });
            };

            return (
                <div>
                    <nav className="no-print bg-[#221F5F] text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-[1100px] mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center space-x-3">
                                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png" alt="Tourmaker" className="h-6 brightness-0 invert" />
                                <span className="font-bold tracking-tight">진에어 업무 자동화 시스템</span>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-2">
                                <button onClick={loadHwangjiTemplate} className="flex items-center space-x-1 bg-amber-500 hover:bg-amber-600 px-3 py-1.5 rounded text-sm font-bold transition-all">
                                    <IconZap /> <span>황지정고 템플릿 로드</span>
                                </button>
                                <button onClick={exportToJson} className="flex items-center space-x-1 bg-emerald-600 hover:bg-emerald-700 px-3 py-1.5 rounded text-sm font-bold transition-all">
                                    <IconSave /> <span>내 기기 저장(JSON)</span>
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center space-x-1 bg-slate-600 hover:bg-slate-700 px-3 py-1.5 rounded text-sm font-bold transition-all">
                                    <IconFolder /> <span>파일 불러오기</span>
                                </button>
                                <input type="file" ref={fileInputRef} onChange={importFromJson} accept=".json" className="hidden" />
                                <div className="w-px h-6 bg-white/20 mx-1"></div>
                                <button onClick={handlePrint} className="flex items-center space-x-1 bg-white text-[#221F5F] px-4 py-1.5 rounded text-sm font-black shadow-md transition-all active:scale-95">
                                    <IconPrinter /> <span>PDF 저장 / 인쇄</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="no-print max-w-[850px] mx-auto mt-8 flex px-4">
                        <button onClick={() => setActiveTab('school')} className={`flex-1 py-3 font-bold rounded-t-xl transition-all border-b-4 ${activeTab === 'school' ? 'bg-white text-[#221F5F] border-[#221F5F] shadow-sm' : 'bg-slate-200 text-slate-500 border-transparent hover:bg-slate-300'}`}>학교용 (수학여행)</button>
                        <button onClick={() => setActiveTab('agency')} className={`flex-1 py-3 font-bold rounded-t-xl transition-all border-b-4 ${activeTab === 'agency' ? 'bg-white text-[#221F5F] border-[#221F5F] shadow-sm' : 'bg-slate-200 text-slate-500 border-transparent hover:bg-slate-300'}`}>대리점용 (여행사)</button>
                    </div>

                    <main className="max-w-[850px] mx-auto bg-white shadow-2xl print:shadow-none mb-10 overflow-hidden print:m-0">
                        <div className="p-[50px] md:p-[70px] print:p-0">
                            {activeTab === 'school' ? <SchoolForm /> : <AgencyForm />}
                        </div>
                    </main>

                    <footer className="no-print max-w-[850px] mx-auto py-8 text-center border-t border-slate-200">
                        <p className="text-[13px] text-slate-500">
                            [System Powered by TOURMAKER] 본 스마트 가이드북은 투어메이커의 기획과 
                            <a href="https://tourmaker.kr" target="_blank" className="font-bold text-blue-500 mx-1">투어메이커</a>의 트래블 테크 기술 제휴로 제작되었습니다.
                        </p>
                    </footer>
                </div>
            );
        };

        const JinAirHeader = () => (
            <div className="mb-10 pb-4 border-b-2 border-black flex justify-center">
                <img src="https://blogger.googleusercontent.com/img/a/AVvXsEida-rIZa-IdJHiWbOYJBuSlrPIjAyxGpahaxUdf8swIII6NFUBQUXLI3KWOTRY7nV7o8IkI7j9XiSgMuN3Bxld30poFhANxP5WD4mEl4656Ag61xVf98p25ieR_5DBsvL_uDp804KnDKs7xqpapjIfi1AuvMV9aJVw9QqWsNeQMhWAZuUex5zJ3R2VxsU=w640-h128" alt="JinAir Letterhead" className="w-full max-w-[700px] h-auto object-contain" />
            </div>
        );

        const SchoolForm = () => (
            <div className="text-black leading-tight">
                <JinAirHeader />
                <div className="relative flex flex-col items-center mb-12">
                    <span className="absolute left-0 top-0 font-bold text-[15px]">㈜진에어 귀중</span>
                    <div className="mt-8 flex items-center text-[26px] font-black tracking-tight">
                        <span>(</span>
                        <input type="text" name="s_route" defaultValue="원주 - 제주" className="print-input-line w-[120px] text-center text-xl font-bold mx-1" placeholder="노선입력" />
                        <span>)항공 좌석 요청서</span>
                    </div>
                    <div className="absolute right-0 bottom-[-25px] flex items-center font-bold text-[15px]">
                        <input type="text" name="s_y" defaultValue="2026" className="print-input-line w-14 text-center" placeholder="2026" />년
                        <input type="text" name="s_m" defaultValue="03" className="print-input-line w-10 text-center mx-1" placeholder="03" />월
                        <input type="text" name="s_d" defaultValue="23" className="print-input-line w-10 text-center mx-1" placeholder="23" />일
                    </div>
                </div>

                <p className="font-bold text-[15.5px] mb-4">본교 수학(졸업) 여행에 참석하는 학생에 대한 항공좌석 지원을 아래와 같이 요청합니다.</p>

                <table className="doc-table mb-10">
                    <tbody>
                        <tr>
                            <th className="w-[15%]">일정</th>
                            <th className="w-[10%]">출발</th>
                            <th className="w-[10%]">도착</th>
                            <th className="w-[18%]">일자</th>
                            <th className="w-[32%]">요청 스케줄 (편명/시간)</th>
                            <th className="w-[15%]">요청 좌석수</th>
                        </tr>
                        <tr>
                            <td rowSpan="2" className="bg-[#f2f2f2] text-center font-bold">
                                <div className="flex flex-col items-center justify-center py-2 space-y-1">
                                    <span className="text-[14px]">전체일정</span>
                                    <span className="whitespace-nowrap text-[13px] font-normal">
                                        (<input type="text" name="s_night" defaultValue="3" className="print-input-table w-7 border-b border-slate-400 !bg-transparent font-bold" placeholder="3" />박 
                                        <input type="text" name="s_day" defaultValue="4" className="print-input-table w-7 border-b border-slate-400 !bg-transparent font-bold" placeholder="4" />일)
                                    </span>
                                </div>
                            </td>
                            <td><input type="text" name="s_dep1" defaultValue="원주(WJU)" className="print-input-table" placeholder="예: WJU" /></td>
                            <td><input type="text" name="s_arr1" defaultValue="제주(CJU)" className="print-input-table" placeholder="예: CJU" /></td>
                            <td><input type="text" name="s_date1" defaultValue="09/08" className="print-input-table" placeholder="MM/DD" /></td>
                            <td><input type="text" name="s_flt1" defaultValue="LJ471" className="print-input-table text-left" placeholder="편명/시간" /></td>
                            <td><input type="text" name="s_seat1" defaultValue="50석" className="print-input-table" placeholder="00석" /></td>
                        </tr>
                        <tr>
                            <td><input type="text" name="s_dep2" defaultValue="제주(CJU)" className="print-input-table" placeholder="예: CJU" /></td>
                            <td><input type="text" name="s_arr2" defaultValue="원주(WJU)" className="print-input-table" placeholder="예: WJU" /></td>
                            <td><input type="text" name="s_date2" defaultValue="09/11" className="print-input-table" placeholder="MM/DD" /></td>
                            <td><input type="text" name="s_flt2" defaultValue="LJ474" className="print-input-table text-left" placeholder="편명/시간" /></td>
                            <td><input type="text" name="s_seat2" defaultValue="50석" className="print-input-table" placeholder="00석" /></td>
                        </tr>
                    </tbody>
                </table>

                <table className="doc-table mb-10">
                    <tbody>
                        <tr>
                            <th rowSpan="6" className="w-[15%]">학교 측<br/>기입 항목</th>
                            <th className="w-[18%]">학교명</th>
                            <td colSpan="2"><input type="text" name="s_school" defaultValue="황지정보산업고등학교" className="print-input-table font-bold text-left px-3" /></td>
                        </tr>
                        <tr>
                            <th>담당 교사</th>
                            <td colSpan="2"><input type="text" name="s_teacher" defaultValue="김유숙" className="print-input-table font-bold text-left px-3" /></td>
                        </tr>
                        <tr>
                            <th>주소</th>
                            <td colSpan="2"><input type="text" name="s_address" defaultValue="강원특별자치도 태백시 문화로1길 1" className="print-input-table text-left px-3" /></td>
                        </tr>
                        <tr>
                            <th rowSpan="3" className="w-[18%]">연락처</th>
                            <th className="w-[15%]">내선번호</th>
                            <td><input type="text" name="s_tel" defaultValue="033-550-6520" className="print-input-table" /></td>
                        </tr>
                        <tr>
                            <th>H/P</th>
                            <td><input type="text" name="s_hp" defaultValue="010-8231-3980" className="print-input-table" /></td>
                        </tr>
                        <tr>
                            <th>FAX</th>
                            <td><input type="text" name="s_fax" className="print-input-table" /></td>
                        </tr>
                    </tbody>
                </table>

                <table className="doc-table mb-12">
                    <tbody>
                        <tr>
                            <th className="w-[33%]">예약요청 여행사</th>
                            <td><input type="text" name="s_agency" defaultValue="투어메이커" className="print-input-table font-black text-left px-4" /></td>
                        </tr>
                    </tbody>
                </table>

                <div className="text-[14px] font-bold space-y-2 mb-20 leading-relaxed text-justify">
                    <p>※ 예약 요청 여행사가 유찰 시, 항공 좌석은 최종 낙찰된 여행사에게 양도 됩니다.</p>
                    <p>※ 본 항공 좌석 요청과 관련한 확인/협조 요청 사항은 뒷장에 첨부된 파일을 참고하여 주시기 바랍니다.</p>
                </div>

                <div className="flex justify-end items-center text-[18px] font-black px-4 mb-4">
                    <span className="mr-8">학 교 장</span>
                    <input type="text" name="s_sign_name" defaultValue="최준집" className="print-input-line w-32 text-center" />
                    <span className="ml-2 font-bold">(인)</span>
                </div>

                <div className="page-break my-16 border-t border-dashed border-slate-300 print:border-none"></div>
                <JinAirHeader />
                <h3 className="text-[16px] font-black mb-4 tracking-tight">* 항공좌석지원 요청과 관련된 확인 사항 및 공항업무 협조요청사항</h3>
                
                <div className="text-[14px] leading-relaxed text-black font-medium text-justify mb-6">
                    <p className="mb-4 text-[14.5px]">교육부에서 발표한 '안전하고 교육적인 수학여행 시행방안(14.06.30 부)'과 관련하여<br/>수학(졸업)여행 항공좌석지원 요청 전 아래와 같은 사항들을 확인 후, 송부 바랍니다.</p>
                    
                    <div className="box-border-strong space-y-6">
                        <div>
                            <h4 className="font-black text-[15px] mb-1">1) 스케줄 관련</h4>
                            <p className="pl-2">• 항공 스케줄은 정부 인허가 조건이며, 지원된 좌석은 동/하계 스케줄 조정에 따라 변경 가능성이 있습니다.</p>
                        </div>

                        <div>
                            <h4 className="font-black text-[15px] mb-1">2) 입찰 관련</h4>
                            <ul className="list-disc pl-7 space-y-1">
                                <li>학단 출발 50일 이전 입찰 완료합니다. (단, 기간이내 시, 항공사와 협의 필요.)</li>
                                <li className="text-red-strong">입찰 공고 시, 진에어 이용조건이 표기되어야 하며, 미표기 시, 통보없이 좌석은 회수될 수 있습니다.</li>
                                <li className="text-red-strong">낙찰 이전 임의로 발권된 항공권은 진에어 취소위약금 규정에 따라 발권 업체 부담이며, 해당 좌석은 항공사로 귀속됩니다.</li>
